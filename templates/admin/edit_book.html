{% extends "base.html" %}
{% block title %}Edit Book{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="page-header"><h4 class="fw-bold mb-0"><i class="bi bi-pencil me-2"></i>Edit Book: {{ book.title }}</h4></div>
    <div class="card border-0 shadow-sm rounded-3 p-4">
      <form method="post">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold">Title *</label>
            <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Authors (comma-separated)</label>
            <input type="text" name="authors" class="form-control" value="{{ author_str }}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Keywords (comma-separated)</label>
            <input type="text" name="keywords" class="form-control" value="{{ kw_str }}">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Book Type</label>
            <select name="book_type" class="form-select">
              <option value="new" {{ 'selected' if book.book_type == 'new' }}>New</option>
              <option value="used" {{ 'selected' if book.book_type == 'used' }}>Used</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Purchase Option</label>
            <select name="purchase_option" class="form-select">
              <option value="both" {{ 'selected' if book.purchase_option == 'both' }}>Both</option>
              <option value="buy" {{ 'selected' if book.purchase_option == 'buy' }}>Buy Only</option>
              <option value="rent" {{ 'selected' if book.purchase_option == 'rent' }}>Rent Only</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Format</label>
            <select name="format" class="form-select">
              <option value="hardcover" {{ 'selected' if book.format == 'hardcover' }}>Hardcover</option>
              <option value="softcover" {{ 'selected' if book.format == 'softcover' }}>Softcover</option>
              <option value="electronic" {{ 'selected' if book.format == 'electronic' }}>Electronic</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Buy Price (₹)</label>
            <input type="number" name="price" class="form-control" step="0.01" value="{{ book.price }}">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Rent Price/mo (₹)</label>
            <input type="number" name="rent_price" class="form-control" step="0.01" value="{{ book.rent_price or '' }}">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Quantity</label>
            <input type="number" name="quantity" class="form-control" value="{{ book.quantity }}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Category</label>
            <select name="category_id" class="form-select">
              <option value="">Select Category</option>
              {% for cat in categories %}
              <option value="{{ cat.category_id }}" {{ 'selected' if book.category_id == cat.category_id }}>{{ cat.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ book.description or '' }}</textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-warning">Save Changes</button>
          <a href="{{ url_for('admin_books') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
