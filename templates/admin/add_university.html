{% extends "base.html" %}
{% block title %}Add University{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="page-header"><h4 class="fw-bold mb-0"><i class="bi bi-building me-2"></i>Add University</h4></div>
    <div class="card border-0 shadow-sm rounded-3 p-4">
      <form method="post">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold">University Name *</label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Address</label>
            <textarea name="address" class="form-control" rows="2"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Representative First Name</label>
            <input type="text" name="rep_first_name" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Representative Last Name</label>
            <input type="text" name="rep_last_name" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Rep Email</label>
            <input type="email" name="rep_email" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Rep Phone</label>
            <input type="tel" name="rep_phone" class="form-control">
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-success">Add University</button>
          <a href="{{ url_for('admin_universities') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
