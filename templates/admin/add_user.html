{% extends "base.html" %}
{% block title %}Add Employee{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="page-header"><h4 class="fw-bold mb-0"><i class="bi bi-person-plus me-2"></i>Add Employee</h4></div>
    <div class="card border-0 shadow-sm rounded-3 p-4">
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">First Name *</label>
            <input type="text" name="first_name" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Last Name *</label>
            <input type="text" name="last_name" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Email *</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Password *</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Employee ID</label>
            <input type="text" name="employee_id" class="form-control" placeholder="EMP001">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Role *</label>
            <select name="role" class="form-select">
              <option value="support">Customer Support</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Gender</label>
            <select name="gender" class="form-select">
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Salary (₹)</label>
            <input type="number" name="salary" class="form-control" step="0.01">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Aadhaar Number</label>
            <input type="text" name="aadhaar" class="form-control" maxlength="12">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Phone</label>
            <input type="tel" name="phone" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Address</label>
            <textarea name="address" class="form-control" rows="2"></textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-success">Add Employee</button>
          <a href="{{ url_for('admin_users') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
