{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm rounded-3 p-4">
      <div class="text-center mb-4">
        <i class="bi bi-person-plus text-primary" style="font-size:2.5rem"></i>
        <h3 class="fw-bold mt-2">Create Student Account</h3>
      </div>
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">First Name *</label>
            <input type="text" name="first_name" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Last Name *</label>
            <input type="text" name="last_name" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Email Address *</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Password *</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Phone</label>
            <input type="tel" name="phone" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Date of Birth</label>
            <input type="date" name="date_of_birth" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Address</label>
            <textarea name="address" class="form-control" rows="2"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">University</label>
            <input type="text" name="university" class="form-control" list="uni-list">
            <datalist id="uni-list">
              {% for u in universities %}
              <option value="{{ u.name }}">
              {% endfor %}
            </datalist>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Major / Field of Study</label>
            <input type="text" name="major" class="form-control" placeholder="e.g. Computer Science">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Student Status</label>
            <select name="student_status" class="form-select">
              <option value="undergraduate">Undergraduate</option>
              <option value="graduate">Graduate</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Year of Study</label>
            <select name="year_of_study" class="form-select">
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
              <option value="5">5th Year</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 mt-4">Create Account</button>
      </form>
      <p class="text-center mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
  </div>
</div>
{% endblock %}
