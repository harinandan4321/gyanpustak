{% extends "base.html" %}
{% block title %}New Support Ticket{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="page-header">
      <h4 class="fw-bold mb-0"><i class="bi bi-ticket-perforated me-2"></i>Submit Support Ticket</h4>
    </div>
    <div class="card border-0 shadow-sm rounded-3 p-4">
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Ticket Title *</label>
          <input type="text" name="title" class="form-control" required placeholder="Brief description of the issue">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Category</label>
          <select name="category" class="form-select">
            <option value="user profile">User Profile</option>
            <option value="products">Products</option>
            <option value="cart">Cart</option>
            <option value="orders">Orders</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Problem Description *</label>
          <textarea name="problem_description" class="form-control" rows="5" required placeholder="Describe the issue in detail..."></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Submit Ticket</button>
          <a href="{{ url_for('tickets') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
